spring.application.name=veiculos

# Swagger / OpenAPI — dados exibidos em "Contact" (ajuste para sua apresentação)
openapi.contact.name=Mauricio Araujo
openapi.contact.email=mauriciobgsp@gmail.com

# --- Rate limiting (HTTP 429 + cabeçalhos X-RateLimit-*, Retry-After) ---
# Cada IP (ou X-Forwarded-For se trust-forwarded-headers=true) partilha um "balde" de pedidos.
app.rate-limit.enabled=true
app.rate-limit.capacity=120
app.rate-limit.refill-period=PT1M
app.rate-limit.trust-forwarded-headers=false
